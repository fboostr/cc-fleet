# cc-fleet 配置示例
# 复制本文件为 config.yaml，按需填入实际值；敏感字段通过环境变量注入

# 主控运行时根目录：放 worktree、session 流式日志、SQLite 文件
workspace_root: ~/cc-fleet-workspace

# 应用日志目录
log_dir: ~/Library/Logs/cc-fleet

# SQLite 数据库路径（默认放 workspace_root 下）
db_path: ~/cc-fleet-workspace/state.db

# ── 聊天平台选择 ───────────────────────────────────────────
# 支持 wecom（企业微信）/ wechat（个人微信 ilink）。默认 wecom，旧配置不加此字段自动视为 wecom。
# 只需配置所选平台对应的那一段；未选用的平台段即使留着也会被忽略、不要求其环境变量。
platform: wecom

# 企业微信智能机器人凭据（建议通过环境变量注入，不要明文写在配置里）
wecom:
  bot_id: ${env:WECOM_BOT_ID}
  bot_secret: ${env:WECOM_BOT_SECRET}
  # 仅允许特定 chatid 触发；为空表示不限制
  allowed_chatids: []

# 个人微信（ilink ClawBot，腾讯官方个人号 Bot 协议）。启用时把上面 platform 改为 wechat。
# bot_token 用 `cc-fleet wechat-login` 扫码获取后写进 .env（WECHAT_BOT_TOKEN）。
# 注意官方限制：单聊 1:1、消息按纯文本渲染、机器人不能发文件给用户。
# 默认取消注释，方便个人微信用户直接改 platform 即可用；platform=wecom 时本段会被自动忽略、不要求 WECHAT_BOT_TOKEN。
wechat:
  bot_token: ${env:WECHAT_BOT_TOKEN}
  # base_url 默认官方端点；若 wechat-login 返回的 baseurl 不同则填它
  base_url: https://ilinkai.weixin.qq.com
  # 仅允许特定微信用户(from_user_id)触发；为空表示不限制
  allowed_user_ids: []

# coding agent 工具配置。每个工具一个配置块（与未来 codex / opencode 对称）；目前仅 claude。
claude:
  binary: claude              # Claude Code CLI 可执行名 / 路径

# 交付流水线阶段参数（工具无关：plan / dev / review 是状态机阶段，对所有 agent 通用，不随工具重复）
pipeline:
  plan_timeout_sec: 1800      # plan 阶段单次调用最长 30 分钟
  dev_timeout_sec: 3600       # dev 阶段单次调用最长 60 分钟
  review_timeout_sec: 1800    # Reviewer 单次审查（plan/code）超时；仅启用 reviewer 的 repo 用得到
  max_clarify_rounds: 5       # plan ↔ awaiting_user 最多来回轮数

# ── 默认交互模式（降低新手门槛）───────────────────────────
# 无命令、无引用、无 @repo 的普通消息默认怎么处理：
#   - chat（默认）：先进入 /chat 多轮只读讨论把需求聊清楚，再引用该对话消息发 /dev 转开发；
#                   更贴合普通用户"先聊几轮再动手"的习惯
#   - dev：一句话直接进入 plan→dev→MR 交付流水线（老手快捷；等价旧默认行为）
# 无论此项为何，`@<repo> /dev <需求>` 与「引用一条 /chat 消息 + /dev」都能直达开发。
default_mode: chat

# 工作仓库清单（初次接入建议先只配 1 个：只配 1 个仓库时，发消息无需 @<repo> 前缀，
# 直接说话即可自动归属该仓库——最贴合聊天习惯，也最省心）
# 提 MR/PR 按代码托管平台分流，均无需额外安装 glab / gh 等 CLI：
#   - GitLab：`git push -o merge_request.create ...`（origin 指向 GitLab 即可）
#   - GitHub：先普通 push 再走 REST API 建 PR（需在 .env 配 GITHUB_TOKEN / GH_TOKEN）
#
# 每个仓库的 mode 字段决定生命周期：
#   - mode: local  → path 是本地 git 仓库，主控建 worktree + 主控提 MR（默认）
#   - mode: remote → path 仅是 claude code 启动的本地壳子目录（不必是 git 仓库），
#                    真正代码与 worktree 都在远端；claude 自己 ssh 过去开发与提 MR
#
# platform 字段决定提 MR/PR 的方式（可省略，默认 auto）：
#   - auto   → local 模式按 origin URL 自动探测（含 github.com → github，否则 gitlab）；
#              remote 模式无法本地探测，回退 gitlab
#   - gitlab → 走 push option 建 MR
#   - github → 先 push 再走 REST API 建 PR；GitHub Enterprise（自有域名）必须显式配此项
#
# reviewer 字段（可选，默认关闭）：启用独立 Reviewer agent——plan 阶段审查 plan、
# dev 阶段审查代码，Coder 据其意见完善。建议只对关键仓库开启（多 1~2 次 claude 调用）。
#   - plan 审查：local / remote 都生效
#   - code 审查：local / remote 都生效（remote 经 defer-push：dev 只 commit，审查通过后才单独 push + 建 MR）
#   - 单需求覆盖：用户可在某条需求里用 [review]（本次强制开）/ [review:off]（本次强制关）
#     临时覆盖这里的 enabled，只对该 session 生效，不改仓库默认。
repos:
  - name: demo-repo
    aliases: [demo]
    path: ~/workspace/demo-repo
    default_branch: main
    keywords: []
    # agent: claude（默认，可省略；驱动本仓库 Coder 的 AI coding 工具）
    # mode: local（默认，可省略）
    # platform: auto（默认，可省略；GitHub 仓库会自动探测，无需手填）
    # 可选：启用独立 Reviewer（默认关闭）
    # reviewer:
    #   enabled: true
    #   max_rounds: 1           # 「审查→修订」轮次上限，默认 1；0 等价于关闭

  # GitHub 仓库示例（origin 指向 github.com）
  # - name: my-gh-repo
  #   aliases: [ghdemo]
  #   path: ~/workspace/my-gh-repo
  #   default_branch: main
  #   keywords: []
  #   platform: github        # github.com 可省略（auto 能探测）；GitHub Enterprise 必填
  #   # 另需在 .env 配 GITHUB_TOKEN（或 GH_TOKEN）

  # 远端开发仓库示例（按你公司环境改）
  # - name: my-project
  #   aliases: [myproj]
  #   path: ~/my-project                         # 本地壳子目录，不是 git 仓库
  #   default_branch: main
  #   keywords: [my-project]
  #   mode: remote
  #   remote_ssh_alias: dev01.example.com
  #   remote_repo_path: /home/youruser/my-project
  #   remote_worktree_root: /home/youruser/my-project-worktrees

# 运行时上限：同时驱动的 session 数（含 awaiting_user_clarification）。
# 超出会进队列，dispatch 立即回 "已加入 @<repo> 队列（前面 N 个）"；前一个进终态后自动放行。
# awaiting 的 session 仍占槽位——避免恢复时再排队。
limits:
  max_concurrent_sessions: 4

# ── /chat 只读讨论通道（独立于交付流水线）───────────────────
# `/chat <消息>`（或 `@<repo> /chat`）开一条与 claude 的多轮**只读讨论**：直接在仓库主目录
# 只读运行（读代码 / 理清需求，不建 worktree、不改代码），引用机器人回复即续聊；聊清楚后
# 引用该对话消息发 /dev 才转成正式开发。单仓库时自动绑定唯一仓库；多仓库省略 @repo 时回退到
# default_cwd（不配则用户 home）并给出警告。整段可省略，全部字段都有默认值。
chat:
  default_cwd: ~/cc-fleet-chat   # 多仓库省略 @repo 时的回退工作目录；不配则回退到用户 home
  max_concurrent: 4              # chat 独立并发上限（不占用 limits.max_concurrent_sessions）
  turn_timeout_sec: 3600         # 单轮 claude 子进程超时（秒）
  # 私聊「窗口内免引用自动续聊」时长（秒），默认 1800（30 分钟）、默认开启。仅 default_mode=chat
  # 且私聊（个人微信 1:1 / 企微单聊）下生效：不带引用的普通消息，若距该用户最近一个活跃 chat
  # 的最后一条机器人回复 ≤ 本值，自动续到该会话而非开新；超窗 / 无活跃 chat 则照旧开新。
  # 设 0 关闭（回到"必须引用才续聊"）。想刻意开新话题用 /chat <消息>（永远开新，不受此项影响）。
  auto_continue_window_sec: 1800

# 本地只读 HTTP 面板（浏览器查看 session 状态、claude 事件流）
# 默认开启、仅 127.0.0.1、无鉴权；要关掉就把 enabled 设为 false
http:
  enabled: true
  bind: 127.0.0.1
  port: 8787

# 终态 worktree 自动清理（小时）
worktree_retention_hours: 168       # 7 天
