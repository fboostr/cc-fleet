name: Feature request
description: 提议一个 cc-fleet 的新功能或改进
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议。**大的功能改动**建议先开 issue 讨论方向，再动手实现，避免方向不一致返工。
        不确定属于"明确 feature 提案"还是"想讨论一下"的话，优先开 Discussion。

  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 你现在遇到什么问题 / 想做什么？现有 cc-fleet 哪里不够？
      placeholder: |
        例如：希望支持 Slack 接入，因为我们团队不用企微……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提议方案
      description: 你的想法是什么？API / 配置 / 行为分别长什么样？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其它解法、为什么觉得它们不够好

  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 对现有用户的兼容性影响？是否需要改 config schema / DB schema / CLI 接口？

  - type: textarea
    id: extra
    attributes:
      label: 其它上下文
      description: 关联 issue / 类似项目的实现参考 / 你愿意自己提 PR 吗
